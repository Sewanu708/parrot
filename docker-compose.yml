# docker-compose.yml
services:
  postgres:
    image: postgres:16
    container_name: parrot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parrot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parrot}
      POSTGRES_DB: ${POSTGRES_DB:-parrot_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - parrot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parrot}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  parrot_pgdata:

